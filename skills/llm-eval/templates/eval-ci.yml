# LLM 평가 회귀 게이트 (GitHub Actions 예시)
# .github/workflows/llm-eval.yml 로 복사해 사용.
# 프롬프트/모델/RAG 를 건드리는 PR 에서 평가셋을 돌리고 baseline 대비 회귀를 차단한다.

name: llm-eval

on:
  pull_request:
    paths:
      - "src/lib/llm/**"        # LLM 호출 경로
      - "**/prompts/**"          # 프롬프트
      - "eval/**"                # 평가셋
  workflow_dispatch:

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 평가 대상 함수가 의존성을 쓰면 설치 (예: 2nd-Brain: npm ci --legacy-peer-deps)
      - name: Install
        run: npm ci --legacy-peer-deps

      # 골든 + 엣지 + 적대셋 실행 → result.json
      - name: Run eval
        env:
          # 평가용 LLM 키. 적대셋이 부수효과 함수를 부르지 않게 mock 경계 확인.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_EVAL }}
        run: |
          node skills/llm-eval/scripts/run_eval.mjs \
            --set eval/all.jsonl --out runs/result.json --model gemini-2.x --label ci

      # baseline 대비 판정 — 회귀 시 exit 1 로 PR 차단
      - name: Gate
        run: |
          node skills/llm-eval/scripts/gate.mjs \
            --baseline eval/baseline.json --result runs/result.json --drop 0.02

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval-result
          path: runs/result.json
